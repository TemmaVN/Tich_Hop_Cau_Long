# API Gateway — 1 cổng (8000) đứng trước cả 2 backend.
# Container chạy network_mode: host nên proxy thẳng tới localhost.

upstream dotnet_backend {
    server 127.0.0.1:5000;
}

upstream python_backend {
    server 127.0.0.1:5001;
}

server {
    listen 8000;

    # Backend Python — API Thống kê (bản Python tương đương StatisticController .NET)
    location /api/admin/statistic {
        proxy_pass         http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend Python — API Bảo hành (feature .NET chưa có, Python đảm nhận)
    location /api/Warranty {
        client_max_body_size 50m;   # cho phép upload ảnh/video bảo hành
        proxy_pass         http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend Python — mọi path bắt đầu bằng /api/python/
    location /api/python/ {
        proxy_pass         http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend .NET — tất cả còn lại (/api/*, static, v.v.)
    location / {
        proxy_pass         http://dotnet_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
